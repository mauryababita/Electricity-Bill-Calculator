<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electricity Bill Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fa;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      margin-top: 40px;
      padding: 20px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 400px;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      background: #f1f8ff;
      border: 1px solid #d0e7ff;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Electricity Bill Calculator</h2>

  <label for="name">Customer Name:</label>
  <input type="text" id="name" placeholder="Enter name">

  <label for="prev">Previous Reading:</label>
  <input type="number" id="prev" placeholder="e.g. 1200">

  <label for="curr">Current Reading:</label>
  <input type="number" id="curr" placeholder="e.g. 1350">

  <button onclick="calculateBill()">Calculate Bill</button>

  <div class="result" id="result"></div>
</div>

<script>
  function calculateBill() {
    const name = document.getElementById("name").value.trim();
    const prev = parseInt(document.getElementById("prev").value);
    const curr = parseInt(document.getElementById("curr").value);
    const resultDiv = document.getElementById("result");

    if (!name || isNaN(prev) || isNaN(curr) || curr < prev) {
      resultDiv.innerHTML = "<p style='color:red'>Please enter valid inputs.</p>";
      return;
    }

    const units = curr - prev;
    let amount = 0, remaining = units;

    // slab 1: 0-100
    let slab = Math.min(remaining, 100);
    amount += slab * 3.5;
    remaining -= slab;

    // slab 2: 101-200
    if (remaining > 0) {
      slab = Math.min(remaining, 100);
      amount += slab * 4.0;
      remaining -= slab;
    }

    // slab 3: 201-400
    if (remaining > 0) {
      slab = Math.min(remaining, 200);
      amount += slab * 5.2;
      remaining -= slab;
    }

    // slab 4: >400
    if (remaining > 0) {
      amount += remaining * 6.5;
    }

    // fixed charge + 5% tax
    amount += 50;
    amount += amount * 0.05;
    amount = amount.toFixed(2);

    resultDiv.innerHTML = `
      <h3>Bill Details</h3>
      <p><strong>Name:</strong> ${name}</p>
      <p><strong>Units Consumed:</strong> ${units}</p>
      <p><strong>Total Bill:</strong> ₹${amount}</p>
    `;
  }
</script>

</body>
</html>
